						<g id="card-text">
							<defs>
								<linearGradient gradientTransform="rotate(100)" id="card-text-gradient">
									<stop offset="0%" stop-color="var(--color-top)"></stop>
									<stop offset="10%" stop-color="var(--color-top)"></stop>
									<stop offset="20%" stop-color="var(--color-top)"></stop>
									<stop offset="70%" stop-color="var(--color-bottom)"></stop>
									<stop offset="100%" stop-color="var(--color-bottom)"></stop>
								</linearGradient>
							</defs>
							<text class="card-number-title" transform="matrix(1 0 0 1 60 240)">

								<text class="expiration-date" id="expiration-date" transform="matrix(1 0 0 1 590 430)">

						<rect class="back-line" height="10.5" width="664.1" x="42.9" y="198.6"></rect>

					<g>
						<text class="cvv-title" transform="matrix(1 0 0 1 518.083 280.0879)">security code</text>
					</g>
					<text class="back-card-holder-name" id="back-card-holder-name"
					      transform="matrix(1 0 0 1 59.5073 228.6099)">YOUR NAME
					</text>
				</svg>
			</div>
		</div>
	</div>

	<div class="form-container">
		<div class="field-container">
			<label for="cardholder-name-input"> Name </label>
			<input id="cardholder-name-input" maxlength="23" type="text">
		</div>
		<div class="field-container">
			<label for="card-number-input"> Card Number </label>
			<input id="card-number-input" inputmode="numeric" maxlength="19" pattern="[0-9]*" type="text">
		</div>
		<div class="d-flex">
			<div class="field-container">
				<label for="expiration-date-input"> Expiration (mm/yy) </label>
				<input id="expiration-date-input" inputmode="numeric" maxlength="5" pattern="[0-9]*" type="text">
			</div>
			<div class="field-container">
				<label for="security-code-input"> Security Code </label>
				<input id="security-code-input" inputmode="numeric" maxlength="3" pattern="[0-9]*" type="text">
			</div>
		</div>
	</div>

</div>

<script src="js/libs.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
